<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Shape Animations</title>
  <style>

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      padding: 40px 20px;
    }

    h2 {
      color: #fff;
      font-size: 28px;
      letter-spacing: 6px;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 10px;
      text-shadow:
        0 0 5px  #fff,
        0 0 15px #fff,
        0 0 30px #a78bfa,
        0 0 60px #a78bfa,
        0 0 90px #a78bfa;
      animation: titlePulse 3s ease-in-out infinite alternate;
    }

    @keyframes titlePulse {
      from {
        text-shadow:
          0 0 5px #fff,
          0 0 15px #fff,
          0 0 30px #a78bfa,
          0 0 60px #a78bfa;
      }
      to {
        text-shadow:
          0 0 10px #fff,
          0 0 25px #fff,
          0 0 50px #a78bfa,
          0 0 100px #a78bfa,
          0 0 140px #a78bfa;
      }
    }

    .tagline {
      color: #00f0ff;
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 4px;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 50px;
      text-shadow:
        0 0 5px  #00f0ff,
        0 0 15px #00f0ff,
        0 0 30px #00f0ff,
        0 0 60px #00f0ff;
      animation: tagPulse 2s ease-in-out infinite alternate;
    }

    @keyframes tagPulse {
      from {
        text-shadow:
          0 0 5px #00f0ff,
          0 0 15px #00f0ff,
          0 0 30px #00f0ff;
      }
      to {
        text-shadow:
          0 0 10px #00f0ff,
          0 0 25px #00f0ff,
          0 0 50px #00f0ff,
          0 0 90px #00f0ff;
      }
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 140px);
      gap: 50px 30px;
      justify-items: center;
      align-items: center;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      animation: float 3s ease-in-out infinite alternate;
    }
    .card:nth-child(2) { animation-delay: 0.3s; }
    .card:nth-child(3) { animation-delay: 0.6s; }
    .card:nth-child(4) { animation-delay: 0.9s; }
    .card:nth-child(5) { animation-delay: 1.2s; }
    .card:nth-child(6) { animation-delay: 1.5s; }
    .card:nth-child(7) { animation-delay: 1.8s; }
    .card:nth-child(8) { animation-delay: 2.1s; }
    .card:nth-child(9) { animation-delay: 2.4s; }

    @keyframes float {
      from { transform: translateY(0px); }
      to   { transform: translateY(-10px); }
    }

    .card span {
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      animation: glowPulse 2s ease-in-out infinite alternate;
    }

    @keyframes glowPulse {
      from { opacity: 0.7; letter-spacing: 2px; }
      to   { opacity: 1;   letter-spacing: 3px; }
    }

    .circle-label {
      color: #FFB6C1;
      text-shadow: 0 0 6px #FFB6C1, 0 0 16px #FFB6C1, 0 0 30px #FFB6C1;
    }
    .star-label {
      color: #FFD700;
      text-shadow: 0 0 6px #FFD700, 0 0 16px #FFD700, 0 0 30px #FFD700;
    }
    .tri-label {
      color: #7B61FF;
      text-shadow: 0 0 6px #7B61FF, 0 0 16px #7B61FF, 0 0 30px #7B61FF;
    }
    .hex-label {
      color: #00C896;
      text-shadow: 0 0 6px #00C896, 0 0 16px #00C896, 0 0 30px #00C896;
    }
    .blob-label {
      color: #FF6B6B;
      text-shadow: 0 0 6px #FF6B6B, 0 0 16px #FF6B6B, 0 0 30px #FF6B6B;
    }
    .diamond-label {
      color: #FF9F43;
      text-shadow: 0 0 6px #FF9F43, 0 0 16px #FF9F43, 0 0 30px #FF9F43;
    }
    .penta-label {
      color: #54A0FF;
      text-shadow: 0 0 6px #54A0FF, 0 0 16px #54A0FF, 0 0 30px #54A0FF;
    }
    .ring-label {
      color: #E84393;
      text-shadow: 0 0 6px #E84393, 0 0 16px #E84393, 0 0 30px #E84393;
    }
    .square-label {
      color: #A29BFE;
      text-shadow: 0 0 6px #A29BFE, 0 0 16px #A29BFE, 0 0 30px #A29BFE;
    }

    .circle {
      width: 76px; height: 76px;
      background: #FFB6C1;
      border: 3px solid #000;
      border-radius: 50%;
      box-shadow: 0 0 14px #FFB6C1, 0 0 30px #FFB6C155;
      animation: spin 3s linear infinite;
    }

    .star {
      width: 80px; height: 80px;
      background: #FFD700;
      border: 3px solid #000;
      clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
      filter: drop-shadow(0 0 8px #FFD700);
      animation: spin 4s linear infinite;
    }

    .tri-wrap {
      width: 80px; height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      filter: drop-shadow(0 0 8px #7B61FF);
      animation: spin 2.5s ease-in-out infinite;
    }
    .tri-inner {
      width: 0; height: 0;
      border-left: 36px solid transparent;
      border-right: 36px solid transparent;
      border-bottom: 72px solid #7B61FF;
    }

    .hex {
      width: 80px; height: 80px;
      background: #00C896;
      border: 3px solid #000;
      clip-path: polygon(25% 5%, 75% 5%, 100% 50%, 75% 95%, 25% 95%, 0% 50%);
      filter: drop-shadow(0 0 8px #00C896);
      animation: spin 3.5s linear infinite;
    }

    .blob {
      width: 80px; height: 80px;
      background: #FF6B6B;
      border: 3px solid #000;
      box-shadow: 0 0 14px #FF6B6B, 0 0 30px #FF6B6B55;
      animation: spin 4s linear infinite, morph 5s ease-in-out infinite alternate;
    }

    .diamond {
      width: 74px; height: 74px;
      background: #FF9F43;
      border: 3px solid #000;
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
      filter: drop-shadow(0 0 8px #FF9F43);
      animation: spin 2s linear infinite;
    }

    .penta {
      width: 80px; height: 80px;
      background: #54A0FF;
      border: 3px solid #000;
      clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
      filter: drop-shadow(0 0 8px #54A0FF);
      animation: spin 3s linear infinite;
    }

    .ring {
      width: 78px; height: 78px;
      border-radius: 50%;
      border: 11px solid #1a1a1a;
      border-top: 11px solid #E84393;
      border-right: 11px solid #FF6B6B;
      border-bottom: 11px solid #FFD700;
      box-shadow: 0 0 14px #E84393, 0 0 30px #E8439355;
      animation: spin 1s linear infinite;
    }

    .square {
      width: 68px; height: 68px;
      background: #A29BFE;
      border: 3px solid #000;
      border-radius: 10px;
      box-shadow: 0 0 14px #A29BFE, 0 0 30px #A29BFE55;
      animation: spinSquare 4s ease-in-out infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    @keyframes morph {
      0%   { border-radius: 40% 60% 60% 40% / 40% 40% 60% 60%; }
      25%  { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
      50%  { border-radius: 30% 70% 70% 30% / 50% 60% 40% 50%; }
      75%  { border-radius: 70% 30% 50% 50% / 30% 70% 60% 40%; }
      100% { border-radius: 40% 60% 60% 40% / 40% 40% 60% 60%; }
    }

    @keyframes spinSquare {
      0%   { transform: rotate(0deg)   scale(1); }
      25%  { transform: rotate(90deg)  scale(1.1); }
      50%  { transform: rotate(180deg) scale(1); }
      75%  { transform: rotate(270deg) scale(0.9); }
      100% { transform: rotate(360deg) scale(1); }
    }

    .footer {
      margin-top: 50px;
      color: #ffffff;
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-align: center;
      text-shadow:
        0 0 5px  #a78bfa,
        0 0 15px #a78bfa,
        0 0 30px #a78bfa,
        0 0 60px #a78bfa;
    }

  </style>
</head>
<body>

  <h2>CSS Shape Animations</h2>
  <p class="tagline">Pure HTML &amp; CSS &mdash; No Libraries</p>

  <div class="grid">
    <div class="card"><div class="circle"></div><span class="circle-label">Circle</span></div>
    <div class="card"><div class="star"></div><span class="star-label">Star</span></div>
    <div class="card"><div class="tri-wrap"><div class="tri-inner"></div></div><span class="tri-label">Triangle</span></div>
    <div class="card"><div class="hex"></div><span class="hex-label">Hexagon</span></div>
    <div class="card"><div class="blob"></div><span class="blob-label">Blob</span></div>
    <div class="card"><div class="diamond"></div><span class="diamond-label">Diamond</span></div>
    <div class="card"><div class="penta"></div><span class="penta-label">Pentagon</span></div>
    <div class="card"><div class="ring"></div><span class="ring-label">Ring</span></div>
    <div class="card"><div class="square"></div><span class="square-label">Square</span></div>
  </div>

  

</body>
</html>
